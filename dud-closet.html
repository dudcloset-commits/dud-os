<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#F0F0F0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
:root{
  --bg:#0A0A0A;--surf:#111;--card:#1A1A1A;--card2:#222;--border:#2A2A2A;
  --or:#FF6B00;--orG:rgba(255,107,0,0.15);--text:#F0F0F0;--muted:#888;--dim:#555;
  --ok:#4CAF7D;--warn:#F0A500;--err:#E84545;--wa:#25D366;
}
input,select,button{font-family:inherit}
input,select{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:13px;width:100%;outline:none}
button{cursor:pointer;border-radius:6px;font-weight:600;font-size:13px;transition:opacity .15s;white-space:nowrap}
button:hover{opacity:.85}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.tag{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
th,td{padding:9px 10px;text-align:left;font-size:12px;border-bottom:1px solid var(--border)}
th{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;background:#111}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#111;border-radius:12px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap}
.lbl{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.pill{border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:11px;background:var(--card2);color:var(--muted)}
.pill.active{background:var(--or);color:#000;border-color:var(--or);font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.scrollx{overflow-x:auto}
/* Print styles */
@media print{
  body{background:#fff;color:#000}
  #app-header,#app-nav,#no-print{display:none!important}
  .print-invoice{display:block!important}
}
</style>
</head>

  const p=document.getElementById("login-pass");

// ════════════════════════════════════
function renderDashboard(){
  const now=new Date();
  const thisM=mKey(todayStr());
  const lastM=mKey(new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().split("T")[0]);
  const mS=m=>STATE.sales.filter(s=>mKey(s.date)===m);
  const mRev=m=>mS(m).reduce((a,s)=>a+s.total,0);
  const mProfit=m=>mS(m).reduce((a,s)=>a+s.profit,0);
  const thisRev=mRev(thisM),lastRev=mRev(lastM),thisProfit=mProfit(thisM);
  const totalRev=STATE.sales.reduce((a,s)=>a+s.total,0);
  const growth=lastRev>0?(((thisRev-lastRev)/lastRev)*100).toFixed(1):null;
  const low=STATE.products.filter(p=>p.stock<=p.minStock&&p.stock>0);
  const out=STATE.products.filter(p=>p.stock===0);
  const months6=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
    return{key:mKey(d.toISOString().split("T")[0]),label:d.toLocaleString("en-IN",{month:"short"})};
  });
  const maxRev=Math.max(...months6.map(m=>mRev(m.key)),1);
  const bars=months6.map(({key,label})=>{
    const rev=mRev(key);const h=Math.max((rev/maxRev)*72,4);const isThis=key===thisM;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="font-size:9px;color:var(--muted)">${rev>0?fmtK(rev):""}</div>
      <div style="width:100%;height:${h}px;background:${isThis?"var(--or)":"var(--border)"};border-radius:3px 3px 0 0"></div>

let CART=[];let BILL_CUST={phone:"",name:"",found:null};let BILL_DISC=0;let BILL_PAY="Cash";let BILL_CHAN="Store";let BILL_STAFF="";let BILL_CAT="All";let BILL_SEARCH="";

function cartTotals(){
  const sub=CART.reduce((a,i)=>a+i.price*i.qty,0);
  const discAmt=Math.round(sub*BILL_DISC/100);
  const total=sub-discAmt;
  const savings=CART.reduce((a,i)=>a+(i.mrp-i.price)*i.qty,0)+discAmt;
  const profit=CART.reduce((a,i)=>a+(i.price-i.cost)*i.qty,0)-discAmt;
  const gst=CART.reduce((a,i)=>{const lt=i.price*i.qty*(1-BILL_DISC/100);return a+lt-lt*100/(100+i.gst);},0);
  return{sub,discAmt,total,savings,profit,gst:Math.round(gst)};
}

function addToCart(pid){
  const prod=STATE.products.find(p=>p.id===pid);
  if(!prod||prod.stock===0)return;
  const ex=CART.find(i=>i.id===pid);
  if(ex){
    if(ex.qty>=prod.stock){showToast("Max stock reached","warn");return;}
    ex.qty++;
  }else{
    CART.push({id:pid,name:prod.name,sku:prod.sku,price:prod.sell,mrp:prod.mrp,cost:prod.cost,gst:prod.gst,hsn:prod.hsn,qty:1,comboApplied:false});
  }
  // Combo check for socks
  if(pid==="p09"){
    const s=CART.find(i=>i.id==="p09");
    if(s&&s.qty>=3&&!s.comboApplied)showComboPopup();
  }
  renderApp();
}
function removeFromCart(pid){CART=CART.filter(i=>i.id!==pid);renderApp();}
function updateCartQty(pid,delta){
  const item=CART.find(i=>i.id===pid);if(!item)return;
  item.qty+=delta;if(item.qty<=0)CART=CART.filter(i=>i.id!==pid);
  renderApp();
}
function setBillCat(c){BILL_CAT=c;renderApp();}
function setBillChan(c){BILL_CHAN=c;renderApp();}
function setBillSearch(v){BILL_SEARCH=v;renderApp();}
function setCustPhone(v){BILL_CUST.phone=v;}
function setCustName(v){BILL_CUST.name=v;}
function lookupCust(){
  const phone=document.getElementById("cust-phone")?document.getElementById("cust-phone").value:BILL_CUST.phone;
  BILL_CUST.phone=phone;
  const c=STATE.customers.find(c=>c.phone===phone.trim());
  if(c){BILL_CUST.found=c;BILL_CUST.name=c.name;showToast("Welcome back, "+c.name+"! 🧡");}
  else BILL_CUST.found=null;
  renderApp();
}

  const pop=document.createElement("div");

function applyCombo(){
  const s=CART.find(i=>i.id==="p09");
  if(s){s.price=Math.floor(499/s.qty);s.comboApplied=true;}
  document.getElementById("combo-pop")&&document.getElementById("combo-pop").remove();
  showToast("Combo applied! Buy 3 Socks @ ₹499 🧡");renderApp();
}

function generateBill(){
  const phone=document.getElementById("cust-phone")?document.getElementById("cust-phone").value.trim():BILL_CUST.phone.trim();
  const name=document.getElementById("cust-name")?document.getElementById("cust-name").value.trim():BILL_CUST.name.trim();
  if(CART.length===0){showToast("Cart is empty","err");return;}
  if(!phone){showToast("Enter customer phone","err");return;}
  if(!name){showToast("Enter customer name","err");return;}
  BILL_CUST.phone=phone;BILL_CUST.name=name;
  // Upsert customer
  let cust=STATE.customers.find(c=>c.phone===phone);
  const isNew=!cust;
  const {sub,discAmt,total,savings,profit,gst}=cartTotals();
  if(isNew){
    cust={id:uid(),phone,name,createdAt:todayStr(),lastVisit:todayStr(),broadcast:true,totalSpend:total,visits:1};
    STATE.customers.unshift(cust);
  }else{
    cust.visits=(cust.visits||0)+1;cust.totalSpend=(cust.totalSpend||0)+total;cust.lastVisit=todayStr();
    STATE.customers=STATE.customers.map(c=>c.phone===phone?cust:c);
  }
  saveC();
  // Build sale
  const sale={
    id:uid(),invoiceNo:invNo(STATE.invCounter),date:todayStr(),channel:BILL_CHAN,
    customerName:name,customerPhone:phone,
    items:CART.map(i=>({...i})),
    sub,discAmt,discount:BILL_DISC,gst,total,profit,savings,
    payMode:BILL_PAY,staffName:BILL_STAFF,isNew
  };
  STATE.sales.unshift(sale);saveS();
  // Deduct stock
  CART.forEach(ci=>{
    const p=STATE.products.find(p=>p.id===ci.id);
    if(p)p.stock=Math.max(0,p.stock-ci.qty);
  });
  saveP();
  STATE.invCounter++;saveIC();
  showInvoiceModal(sale,cust,isNew);
  CART=[];BILL_CUST={phone:"",name:"",found:null};BILL_DISC=0;BILL_STAFF="";
  renderApp();
}

function saveProd(id){
  const name=document.getElementById("pf-name").value.trim();
  const sku=document.getElementById("pf-sku").value.trim();
  if(!name||!sku){showToast("Name and SKU required","err");return;}
  const prod={
    id:id||uid(),name,sku,
    hsn:document.getElementById("pf-hsn").value,
    cat:document.getElementById("pf-cat").value,
    gst:Number(document.getElementById("pf-gst").value),
    cost:Number(document.getElementById("pf-cost").value),
    sell:Number(document.getElementById("pf-sell").value),
    mrp:Number(document.getElementById("pf-mrp").value)||Number(document.getElementById("pf-sell").value),
    minStock:Number(document.getElementById("pf-min").value),
    stock:Number(document.getElementById("pf-stock").value),
    offer:document.getElementById("pf-offer").value,
  };
  if(id)STATE.products=STATE.products.map(p=>p.id===id?prod:p);
  else STATE.products.unshift(prod);
  saveP();document.getElementById("prod-form").remove();
  showToast(id?"Product updated":"Product added");renderApp();
}

function deleteProd(id){
  if(!confirm("Delete this product?"))return;
  STATE.products=STATE.products.filter(p=>p.id!==id);saveP();
  showToast("Deleted");renderApp();
}

function confirmDeleteSale(sid){
  const sale=STATE.sales.find(s=>s.id===sid);
  if(!sale)return;
  const pop=document.createElement("div");
  pop.className="modal-bg";pop.id="del-sale-pop";
  pop.innerHTML=`<div class="modal" style="max-width:340px;text-align:center;border:1px solid var(--err)">
    <div style="font-size:32px;margin-bottom:8px">🗑</div>
    <div style="font-weight:800;font-size:15px;color:var(--err);margin-bottom:6px">Delete Invoice?</div>
    <div style="font-size:13px;color:var(--text);margin-bottom:4px"><strong>${sale.invoiceNo}</strong> · ${sale.customerName}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${sale.date} · ₹${sale.total}</div>
    <div style="font-size:11px;color:var(--warn);background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);border-radius:6px;padding:8px;margin:12px 0">
      ⚠ Stock for items in this bill will be restored back to inventory.
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="deleteSale('${sid}')" style="background:var(--err);border:none;color:#fff;flex:1;padding:10px;border-radius:6px;font-weight:800">Yes, Delete</button>
      <button onclick="document.getElementById('del-sale-pop').remove()" style="background:var(--border);border:none;color:var(--muted);flex:1;padding:10px;border-radius:6px">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(pop);
}

function deleteSale(sid){
  const sale=STATE.sales.find(s=>s.id===sid);
  if(!sale){document.getElementById("del-sale-pop")&&document.getElementById("del-sale-pop").remove();return;}
  // Restore stock
  sale.items.forEach(ci=>{
    const p=STATE.products.find(p=>p.id===ci.id);
    if(p)p.stock=p.stock+ci.qty;
  });
  saveP();
  // Remove sale
  STATE.sales=STATE.sales.filter(s=>s.id!==sid);
  saveS();
  // Update customer spend
  const cust=STATE.customers.find(c=>c.phone===sale.customerPhone);
  if(cust){
    cust.totalSpend=Math.max(0,(cust.totalSpend||0)-sale.total);
    cust.visits=Math.max(0,(cust.visits||0)-1);
    STATE.customers=STATE.customers.map(c=>c.phone===sale.customerPhone?cust:c);
    saveC();
  }
  document.getElementById("del-sale-pop")&&document.getElementById("del-sale-pop").remove();
  showToast("Invoice "+sale.invoiceNo+" deleted. Stock restored.","warn");
  renderApp();
}

let SALES_PERIOD="month";
function renderSales(){
  const now=new Date();
  const filtered=STATE.sales.filter(s=>{
    const d=new Date(s.date);
    if(SALES_PERIOD==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(SALES_PERIOD==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
  const rev=filtered.reduce((a,s)=>a+s.total,0);
  const profit=filtered.reduce((a,s)=>a+s.profit,0);
  const gst=filtered.reduce((a,s)=>a+(s.gst||0),0);
  const savings=filtered.reduce((a,s)=>a+(s.savings||0),0);
  const chCols={Store:"var(--or)",WooCommerce:"#8B44AC",Amazon:"var(--warn)",Flipkart:"#2B7BE8"};
  const chRows=CHANNELS.map(ch=>{
    const cRev=filtered.filter(s=>s.channel===ch).reduce((a,s)=>a+s.total,0);
    const cnt=filtered.filter(s=>s.channel===ch).length;
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;color:${chCols[ch]};font-weight:600">${ch}</span><span style="font-size:11px;color:var(--muted)">${cnt} sales</span><span style="font-size:12px;font-weight:700">${fmt(cRev)}</span></div>`;
  }).join("");
  const payRows=PAY_MODES.map(m=>{
    const mRev=filtered.filter(s=>s.payMode===m).reduce((a,s)=>a+s.total,0);
    const cnt=filtered.filter(s=>s.payMode===m).length;
    return `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px">${m}</span><span style="font-size:11px;color:var(--muted)">${cnt} txns</span><span style="font-size:12px;font-weight:700">${fmt(mRev)}</span></div>`;
  }).join("");
  const saleRows=filtered.slice(0,100).map(s=>`<tr>
    <td style="color:var(--or);font-weight:700">${s.invoiceNo}</td>

function restockProd(pid){

function doRestock(pid){
  const qty=Number(document.getElementById("rs-qty").value)||0;

  if(qty<1){showToast("Enter valid quantity","err");return;}
  const p=STATE.products.find(p=>p.id===pid);if(!p)return;
  p.stock+=qty;if(cost>0)p.cost=cost;
  saveP();document.getElementById("restock-pop").remove();
  showToast(`+${qty} added to ${p.name}. New stock: ${p.stock}`);renderApp();
}

let GST_MONTH=todayStr().slice(0,7);
function renderGST(){
  const mSales=STATE.sales.filter(s=>s.date.startsWith(GST_MONTH));
  const outRows=mSales.flatMap(sale=>sale.items.map(item=>{
    const lt=item.price*item.qty*(1-sale.discount/100);const tv=lt*100/(100+item.gst);const gstAmt=lt-tv;const intra=sale.channel==="Store";
    return{inv:sale.invoiceNo,date:sale.date,cust:sale.customerName,product:item.name,hsn:item.hsn||"",qty:item.qty,rate:item.price,gstR:item.gst,tv:tv.toFixed(2),cgst:intra?(gstAmt/2).toFixed(2):"0.00",sgst:intra?(gstAmt/2).toFixed(2):"0.00",igst:!intra?gstAmt.toFixed(2):"0.00",total:lt.toFixed(2)};
  }));
  const inRows=STATE.vendors.flatMap(v=>(v.orders||[]).filter(o=>o.gstInvoice&&(o.dateOrdered||"").startsWith(GST_MONTH)).map(o=>{
    const total=o.price*o.qty;const g=total-total*100/118;
    return{vendor:v.name,product:o.product,date:o.dateOrdered,total,gstAmt:g.toFixed(2),cgst:(g/2).toFixed(2),sgst:(g/2).toFixed(2)};
  }));
  const wifiExp=STATE.expenses.find(e=>e.gstClaimable&&e.name.toLowerCase().includes("wifi"));
  if(wifiExp&&wifiExp.amount>0&&(wifiExp.date||"").startsWith(GST_MONTH)){const g=wifiExp.amount-wifiExp.amount*100/118;inRows.push({vendor:"ISP",product:"WiFi Bill",date:wifiExp.date,total:wifiExp.amount,gstAmt:g.toFixed(2),cgst:(g/2).toFixed(2),sgst:(g/2).toFixed(2)});}
  const tOutGST=outRows.reduce((a,r)=>a+Number(r.cgst)+Number(r.sgst)+Number(r.igst),0);
  const tInGST=inRows.reduce((a,r)=>a+Number(r.gstAmt),0);
  const netPayable=Math.max(0,tOutGST-tInGST);
  const tOutTV=outRows.reduce((a,r)=>a+Number(r.tv),0);
  const yr=GST_MONTH.slice(0,4);
  const months=Array.from({length:12},(_,i)=>{const m=String(i+1).padStart(2,"0");const key=`${yr}-${m}`;const ms=STATE.sales.filter(s=>s.date.startsWith(key));const out=ms.flatMap(s=>s.items).reduce((a,i)=>{const lt=i.price*i.qty;return a+lt-lt*100/(100+i.gst);},0);return{key,label:new Date(yr,i,1).toLocaleString("en-IN",{month:"short"}),out};});
  const maxOut=Math.max(...months.map(m=>m.out),1);
  return shell(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><h2 style="font-size:18px;font-weight:700">📋 GST Filing</h2><div style="font-size:11px;color:var(--muted)">GSTIN: ${GSTIN} · Internal only</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="month" value="${GST_MONTH}" onchange="GST_MONTH=this.value;renderApp()" style="width:auto;padding:6px 10px">
        <button onclick="exportGST()" style="background:var(--warn);border:none;color:#000;padding:9px 14px;border-radius:6px;font-weight:700">⬇ CSV</button>
      </div>
    </div>
    <div class="grid3" style="margin-bottom:14px">
      ${[{l:"Output GST (Sales)",v:fmt(tOutGST),c:"var(--err)"},{l:"Input GST (Purchases)",v:fmt(tInGST),c:"var(--ok)"},{l:"Net Payable",v:fmt(netPayable),c:"var(--or)",hi:true},{l:"Taxable Value",v:fmt(tOutTV),c:"var(--muted)"}].map(s=>`<div class="card" style="border-left:3px solid ${s.c};padding:12px;${s.hi?"border:1px solid "+s.c:""}"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${s.l}</div><div style="font-size:${s.hi?22:18}px;font-weight:800;color:${s.c}">${s.v}</div></div>`).join("")}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">${yr} Output GST by Month</div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:55px">
        ${months.map(({key,label,out})=>{const h=Math.max((out/maxOut)*48,3);const isCur=key===GST_MONTH;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:100%;height:${h}px;background:${isCur?"var(--or)":"var(--border)"};border-radius:2px 2px 0 0"></div><div style="font-size:8px;color:${isCur?"var(--or)":"var(--muted)"}">${label}</div></div>`;}).join("")}
      </div>
    </div>
    ${inRows.length>0?`<div class="card" style="margin-bottom:14px;padding:0">
      <div style="padding:12px 14px;font-size:11px;color:var(--ok);font-weight:700;border-bottom:1px solid var(--border)">Input Tax Credit — ${GST_MONTH}</div>
      <div class="scrollx"><table><thead><tr>${["Vendor","Product","Date","Total","GST Amt","CGST","SGST"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${inRows.map(r=>`<tr><td>${r.vendor}</td><td>${r.product}</td><td>${r.date}</td><td>${fmt(r.total)}</td><td style="color:var(--ok);font-weight:700">${fmt(r.gstAmt)}</td><td>${fmt(r.cgst)}</td><td>${fmt(r.sgst)}</td></tr>`).join("")}
      <tr style="border-top:2px solid var(--border)"><td colspan="4" style="font-weight:800;padding:10px">TOTAL INPUT</td><td style="color:var(--ok);font-weight:900;font-size:14px;padding:10px">${fmt(tInGST)}</td><td colspan="2"></td></tr>
      </tbody></table></div></div>`:""}
    <div class="card" style="padding:0">
      <div style="padding:12px 14px;font-size:11px;color:var(--err);font-weight:700;border-bottom:1px solid var(--border)">Output Tax (Sales) — ${GST_MONTH}</div>
      <div class="scrollx"><table style="min-width:800px"><thead><tr>${["Invoice","Date","Customer","Product","HSN","Qty","Rate","GST%","Taxable","CGST","SGST","IGST"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${outRows.map(r=>`<tr><td style="color:var(--or)">${r.inv}</td><td style="color:var(--muted)">${r.date}</td><td>${r.cust}</td><td>${r.product}</td><td style="color:var(--muted)">${r.hsn}</td><td>${r.qty}</td><td>₹${r.rate}</td><td>${r.gstR}%</td><td>₹${r.tv}</td><td style="color:var(--warn)">₹${r.cgst}</td><td style="color:var(--warn)">₹${r.sgst}</td><td style="color:#8B44AC">₹${r.igst}</td></tr>`).join("")||`<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--dim)">No sales for ${GST_MONTH}</td></tr>`}
      </tbody></table></div>
    </div>`);
}
function exportGST(){
  const mSales=STATE.sales.filter(s=>s.date.startsWith(GST_MONTH));
  const rows=mSales.flatMap(sale=>sale.items.map(item=>{const lt=item.price*item.qty*(1-sale.discount/100);const tv=lt*100/(100+item.gst);const g=lt-tv;const intra=sale.channel==="Store";return[sale.invoiceNo,sale.date,sale.customerName,sale.customerPhone||"",item.name,item.sku||"",item.hsn||"",item.qty,item.price,item.gst+"%",tv.toFixed(2),intra?(g/2).toFixed(2):"0.00",intra?(g/2).toFixed(2):"0.00",!intra?g.toFixed(2):"0.00",lt.toFixed(2),sale.channel];}));
  const csv=["GST Report — "+GST_MONTH,"GSTIN: "+GSTIN,"",["Invoice","Date","Customer","Phone","Product","SKU","HSN","Qty","Rate","GST%","Taxable","CGST","SGST","IGST","Total","Channel"].join(","),...rows.map(r=>r.join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="DUD_GST_"+GST_MONTH+".csv";a.click();
}
